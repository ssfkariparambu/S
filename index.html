<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahityotsav Bulk Sheet Generator</title>

    <link rel="stylesheet" href="style.css">
    <style>
    /* ===================================
   RESET
=================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    min-height:100%;
    font-family:Arial,Helvetica,sans-serif;
    background:#d9d9d9;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    overflow-x:auto;
}

/* ===================================
   SHEET
=================================== */

.sheet{
    width:21cm;
    min-height:14.85cm;
    background:#fff;

    border:3px solid #000;

    padding:15px;

    position:relative;

    overflow:hidden;

    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.sheet::before{

    content:"";

    position:absolute;

    top:6px;
    left:6px;
    right:6px;
    bottom:6px;

    border:2px solid #000;

    pointer-events:none;

}

/* ===================================
   HEADER
=================================== */

.top-header{

    display:grid;

    grid-template-columns:90px 1fr 90px;

    align-items:center;

    margin-bottom:12px;

}

.header-center{

    gap:5px;
    
    display:flex;
    
    flex-direction:column;

}

.left-logo{

    width:82px;

    display:block;

    object-fit:contain;

}

.fest-logo{

    width:350px;

    max-width:100%;
    
    margin-top: -8px;

    display:block;

}

.edition-logo{

    width:90px;

    display:block;

    justify-self:end;
    
    margin-top: -20px;

}

/* ===================================
   EVENT TITLE
=================================== */

.event-name{

    width:100%;

    font-size:25px;

    font-weight:900;

    text-transform:uppercase;

    margin:8px 0 16px;

    outline:none;

    letter-spacing:.4px;

    line-height:1.2;

}

/* ===================================
   TABLE
=================================== */

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;
    
    margin-top: -5px;

}

table th,
table td{

    border:2px solid #000;

    overflow:hidden;

    white-space:nowrap;

    text-overflow:ellipsis;

}

table th{

    height:45px;

    font-size:17px;

    font-weight:800;

    text-align:center;

}

table td{

    height:38px;

    font-size:15px;

    padding:4px 6px;

    outline:none;

}

/* ===================================
   COLUMN WIDTH (UPDATED)
=================================== */

/* NO */
table th:nth-child(1),
table td:nth-child(1){
    width:6%;
    text-align:center;
}

/* PARTICIPANTS */
table th:nth-child(2){
    width:31%;
    text-align:center;
}

table td:nth-child(2){
    width:31%;
    text-align:left;
}
        
/* BLOCK */
table th:nth-child(3),
table td:nth-child(3){
    width:13%;
    text-align:center;
}

/* CODE */
table th:nth-child(4),
table td:nth-child(4){
    width:10%;
    text-align:center;
}

/* GRADE */
table th:nth-child(5),
table td:nth-child(5){
    width:9%;
    text-align:center;
}

/* POINT */
table th:nth-child(6),
table td:nth-child(6){
    width:10%;
    text-align:center;
}

/* RANK */
table th:nth-child(7),
table td:nth-child(7){
    width:9%;
    text-align:center;
}

/* SIGNATURE */
table th:nth-child(8),
table td:nth-child(8){
    width:12%;
    text-align:center;
}

/* ===================================
   TABLE ALIGNMENT
=================================== */

thead th{
    background:#fff;
    font-weight:800;
    letter-spacing:.3px;
    vertical-align:middle;
}

tbody td{
    vertical-align:middle;
}

tbody tr:hover td{
    background:#fafafa;
}

/* ===================================
   CONTENT EDITABLE
=================================== */

[contenteditable="true"]{
    cursor:text;
}

[contenteditable="true"]:focus{
    background:#fff8cc;
    outline:none;
}

td:empty::before,
.event-name:empty::before{
    content:attr(data-placeholder);
    color:#9a9a9a;
}

/* ===================================
   BUTTONS
=================================== */

.buttons{

    width:21cm;

    margin-top:20px;

    display:flex;

    justify-content:center;

    gap:12px;

    flex-wrap:wrap;

}

.buttons button{

    background:#000;

    color:#fff;

    border:none;

    border-radius:6px;

    padding:11px 22px;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:.2s;

}

.buttons button:hover{

    background:#222;

}

.buttons button:active{

    transform:scale(.96);

}

/* ===================================
   AUTO HEIGHT
=================================== */

.sheet{

    transition:height .25s ease;

}

/* ===================================
   PRINT SETTINGS
=================================== */

@page{
    size:A5 landscape;
    margin:0;
}

@media print{

    html,
    body{
        background:#fff;
        margin:0;
        padding:0;
    }

    .buttons{
        display:none;
    }

    .sheet{

        width:21cm;
        min-height:14.85cm;

        margin:0;

        border:3px solid #000;

        box-shadow:none;

        overflow:hidden;

        page-break-inside:avoid;

        page-break-after:avoid;

    }

    table{
        page-break-inside:avoid;
    }

    tr{
        page-break-inside:avoid;
    }

    *{
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
    }

}

/* ===================================
   PIXEL PERFECT
=================================== */

.top-header{

    padding-bottom:8px;

}

.left-logo,
.fest-logo,
.edition-logo{

    user-select:none;
    -webkit-user-drag:none;

}

table{

    border:2px solid #000;

}

thead th{

    background:#fff;

    font-weight:800;

}

tbody td{

    background:#fff;

}

tbody td:last-child{

    padding-left:10px;

}

/* ===================================
   SELECTION
=================================== */

::selection{

    background:#b9d9ff;

}

/* ===================================
   IMAGE
=================================== */

img{

    pointer-events:none;

}

/* ===================================
   RESPONSIVE
=================================== */

@media (max-width:900px){

    body{

        padding:12px;

        align-items:flex-start;

    }

    .sheet{

        width:21cm;

        min-width:21cm;

    }

    .buttons{

        width:21cm;

        justify-content:center;

    }

}

/* ===================================
   SMALL MOBILE
=================================== */

@media (max-width:600px){

    .buttons{

        flex-direction:column;

    }

    .buttons button{

        width:100%;

    }

}

/* ===================================
   LARGE SCREEN
=================================== */

@media (min-width:1400px){

    body{

        padding:30px;

    }

}
    </style>
</head>
<body>

    <div class="sheet" id="sheet">

        <!-- Header -->
        <div class="top-header">

            <img src="images/logo.png" class="left-logo" alt="Logo">

            <div class="header-center">
                <img src="images/fest.png" class="fest-logo" alt="Sahityotsav">
                <h2 class="krp">KARIPARAMBU UNIT SAHITYOTSAV</h2>
            </div>

            <img src="images/33.png" class="edition-logo" alt="33 Edition">

        </div>

        <!-- Editable Event Name -->
        <div class="event-wrapper">
            <h2 class="event-name" contenteditable="true" spellcheck="false">LP PENCIL DRAWING</h2>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table class="result-table">
                <thead>
                    <tr>
                        <th class="col-no">NO</th>
                        <th class="col-participant">PARTICIPANTS</th>
                        <th class="col-block">BLOCK</th>
                        <th class="col-rank">RANK</th>
                        <th class="col-code">CODE</th>
                        <th class="col-grade">GRADE</th>
                        <th class="col-point">POINT</th>         
                        <th class="col-sign">SIGN</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <!-- Rows will be generated by script.js -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Control Buttons -->
    <div class="buttons">
    <button onclick="addRow()">+ Add Row</button>
    <button onclick="deleteRow()">Delete Row</button>
    <button onclick="printSheet()">Print</button>
    <button onclick="downloadPNG()">PNG</button>
    <button onclick="downloadPDF()">PDF</button>
    <button onclick="clearSheet()">Clear</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>
<script>
/* ============================================
   SAHITYOTSAV BULK IMAGE GENERATOR
   script.js
   PART - 1
============================================ */

const sheet = document.querySelector(".sheet");
const tableBody = document.getElementById("tableBody");

/* -------------------------
   Default Rows
------------------------- */

window.addEventListener("load", () => {

    for (let i = 0; i < 8; i++) {

        createRow();

    }

    updateHeight();

});

/* -------------------------
   Create Row
------------------------- */

function createRow() {

    const row = document.createElement("tr");

    for (let i = 0; i < 8; i++) {

        const td = document.createElement("td");

        td.contentEditable = true;

        td.spellcheck = false;

        td.setAttribute("data-cell", i);

        td.addEventListener("focus", highlightCell);

        td.addEventListener("blur", removeHighlight);

        row.appendChild(td);

    }

    tableBody.appendChild(row);

}

/* -------------------------
   Add Row
------------------------- */

function addRow() {

    createRow();

    updateHeight();

}

/* -------------------------
   Delete Row
------------------------- */

function deleteRow() {

    if (tableBody.rows.length <= 1) return;

    tableBody.removeChild(tableBody.lastElementChild);

    updateHeight();

}

/* -------------------------
   Auto Height
------------------------- */

function updateHeight() {

    const rows = tableBody.rows.length;

    if (rows <= 8) {

        sheet.style.height = "14.85cm";

    } else {

        const extra = rows - 8;

        const newHeight = 14.85 + (extra * 1.02);

        sheet.style.height = newHeight + "cm";

    }

}

/* -------------------------
   Highlight Editing Cell
------------------------- */

function highlightCell(e) {

    e.target.style.background = "#fff6bf";

}

function removeHighlight(e) {

    e.target.style.background = "";

}

/* -------------------------
   Prevent Rich Text Paste
------------------------- */

document.addEventListener("paste", function(e){

    if(e.target.isContentEditable){

        e.preventDefault();

        const text =
        (e.clipboardData || window.clipboardData)
        .getData("text/plain");

        document.execCommand("insertText",false,text);

    }

});

/* ============================================
   SAHITYOTSAV BULK IMAGE GENERATOR
   script.js
   PART - 2
============================================ */

/* -------------------------
   All Editable Cells
------------------------- */

function getEditableCells() {

    return [...document.querySelectorAll("[contenteditable='true']")];

}

/* -------------------------
   Enter = Next Cell
------------------------- */

document.addEventListener("keydown", function (e) {

    if (!e.target.isContentEditable) return;

    if (e.key === "Enter") {

        e.preventDefault();

        const cells = getEditableCells();

        const index = cells.indexOf(document.activeElement);

        if (index < cells.length - 1) {

            cells[index + 1].focus();

        }

    }

});

/* -------------------------
   TAB = Next Cell
------------------------- */

document.addEventListener("keydown", function (e) {

    if (!e.target.isContentEditable) return;

    if (e.key === "Tab") {

        e.preventDefault();

        const cells = getEditableCells();

        const index = cells.indexOf(document.activeElement);

        if (e.shiftKey) {

            if (index > 0) {

                cells[index - 1].focus();

            }

        } else {

            if (index < cells.length - 1) {

                cells[index + 1].focus();

            }

        }

    }

});

/* -------------------------
   Arrow Navigation
------------------------- */

document.addEventListener("keydown", function (e) {

    if (!e.target.isContentEditable) return;

    const cells = getEditableCells();

    const current = document.activeElement;

    const index = cells.indexOf(current);

    if (index === -1) return;

    switch (e.key) {

        case "ArrowRight":

            e.preventDefault();

            if (cells[index + 1]) {

                cells[index + 1].focus();

            }

            break;

        case "ArrowLeft":

            e.preventDefault();

            if (cells[index - 1]) {

                cells[index - 1].focus();

            }

            break;

    }

});

/* -------------------------
   Double Click Select Text
------------------------- */

document.addEventListener("dblclick", function (e) {

    if (e.target.isContentEditable) {

        document.execCommand("selectAll", false, null);

    }

});

/* -------------------------
   Empty Cell Protection
------------------------- */

document.addEventListener("blur", function (e) {

    if (!e.target.isContentEditable) return;

    if (e.target.innerHTML === "<br>") {

        e.target.innerHTML = "";

    }

}, true);

/* -------------------------
   Prevent Drag
------------------------- */

document.addEventListener("dragstart", function (e) {

    e.preventDefault();

});

/* -------------------------
   CTRL + P
------------------------- */

document.addEventListener("keydown", function (e) {

    if (e.ctrlKey && e.key.toLowerCase() === "p") {

        e.preventDefault();

        printSheet();

    }

});

/* -------------------------
   Print
------------------------- */

function printSheet() {

    window.print();

}

/* ============================================
   SAHITYOTSAV BULK IMAGE GENERATOR
   PART - 3
============================================ */

/* -------------------------
   Clear All Cells
------------------------- */

function clearSheet() {

    if (!confirm("Clear all data?")) return;

    document.querySelectorAll("td[contenteditable='true']").forEach(cell => {
        cell.innerHTML = "";
    });

    document.querySelector(".event-name").innerHTML = "LP PENCIL DRAWING";

}

/* -------------------------
   Download PNG
------------------------- */

async function downloadPNG() {

    const canvas = await html2canvas(sheet, {
        scale: 3,
        backgroundColor: "#ffffff",
        useCORS: true
    });

    const link = document.createElement("a");

    let eventName = document.querySelector(".event-name").innerText.trim();
eventName = eventName.replace(/[\\/:*?"<>|]/g, "");

link.download = eventName + ".PNG";

    link.href = canvas.toDataURL("image/png");

    link.click();

}

/* -------------------------
   Download PDF
------------------------- */

async function downloadPDF() {

    const canvas = await html2canvas(sheet, {
        scale: 3,
        backgroundColor: "#ffffff",
        useCORS: true
    });

    const img = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "landscape",
        unit: "cm",
        format: [21, 14.85]
    });

    pdf.addImage(img, "PNG", 0, 0, 21, 14.85);

    let eventName = document.querySelector(".event-name").innerText.trim();
eventName = eventName.replace(/[\\/:*?"<>|]/g, "");

pdf.save(eventName + ".PDF");

}

/* -------------------------
   Keyboard Shortcuts
------------------------- */

document.addEventListener("keydown", function(e){

    if(e.ctrlKey && e.key==="="){

        e.preventDefault();

        addRow();

    }

    if(e.ctrlKey && e.key==="-"){

        e.preventDefault();

        deleteRow();

    }

    if(e.ctrlKey && e.key.toLowerCase()==="d"){

        e.preventDefault();

        downloadPNG();

    }

    if(e.ctrlKey && e.key.toLowerCase()==="s"){

        e.preventDefault();

        downloadPDF();

    }

});

/* -------------------------
   Auto Focus First Cell
------------------------- */

window.addEventListener("load",()=>{

    setTimeout(()=>{

        const first=document.querySelector("td");

        if(first){

            first.focus();

        }

    },300);

});

/* -------------------------
   Prevent Image Drag
------------------------- */

document.querySelectorAll("img").forEach(img=>{

    img.setAttribute("draggable","false");

});

/* -------------------------
   Disable Context Menu
------------------------- */

document.addEventListener("contextmenu",function(e){

    e.preventDefault();

});

/* ============================================
   END OF SCRIPT
============================================ */
</script>
</body>
</html>
