<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahityotsav Image Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Controls (Buttons) */
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #0056b3;
        }

        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #1e7e34;
        }

        /* Wrapper for mobile responsiveness */
        .canvas-wrapper {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto; /* Allows scrolling on mobile without breaking size */
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
        }

        /* MAIN CERTIFICATE CONTAINER */
        /* Exact dimensions requested: Width 21cm, Min-Height 14.85cm */
        .certificate-container {
            width: 21cm;
            min-height: 14.85cm;
            background-color: white;
            border: 5px solid black; /* Outer Thick Border */
            padding: 4px;
            box-sizing: border-box;
            position: relative;
            /* Flexbox to push table down and allow auto height */
            display: flex;
            flex-direction: column;
        }

        /* Inner Thin Border */
        .certificate-inner {
            border: 2px solid black;
            flex-grow: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Header Layout */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* Logos Placeholder */
        .logos-left {
            display: flex;
            gap: 10px;
            height: 60px;
        }
        
        .logos-left img {
            height: 100%;
            object-fit: contain;
        }

        .center-title img {
            height: 70px;
            object-fit: contain;
        }

        .edition-right img {
            height: 70px;
            object-fit: contain;
        }

        /* Text Headings */
        .sub-heading {
            text-align: left;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: -5px;
            letter-spacing: 0.5px;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        .main-heading {
            text-align: left;
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 15px;
            margin-bottom: 15px;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        th, td {
            border: 2px solid black;
            padding: 8px 5px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

        th {
            font-size: 13px;
        }

        /* Highlighting editable fields on click */
        td[contenteditable="true"]:focus, div[contenteditable="true"]:focus {
            background-color: #e8f4ff;
            outline: 2px dashed #007bff;
        }
        
        /* Specific column alignments if needed */
        td:nth-child(2) {
            text-align: left;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="addRowBtn">➕ പുതിയ റോ ചേർക്കുക (Add Row)</button>
        <button class="btn-success" id="downloadBtn">⬇️ ഇമേജ് ആയി ഡൗൺലോഡ് ചെയ്യുക (Download Image)</button>
    </div>

    <div class="canvas-wrapper">

                    </div>
                    
                    <div class="center-title">

                    </div>
                    
                    <div class="edition-right">
                        <img src="https://github.com/ssfkariparambu/S/blob/main/33.png?raw=true" alt="33 Edition">
                    </div>
                </div>

                <div class="sub-heading" contenteditable="true">KARIPARAMBU UNIT SAHITYOTSAV</div>
                <div class="main-heading" contenteditable="true">LP PENCIL DRAWING</div>

                <table id="dataTable">

                            <th>SIGNATURE</th>

                    </thead>
                    <tbody>
                        <tr>
                            <td contenteditable="true">1</td>
                            <td contenteditable="true">MUHAMMED SWALIH K</td>
                            <td contenteditable="true">KRP EAST</td>
                            <td contenteditable="true">A</td>
                            <td contenteditable="true">A</td>
                            <td contenteditable="true">10</td>
                            <td contenteditable="true">1ST</td>
                            <td contenteditable="true"></td>
                        </tr>
                        <tr>
                            <td contenteditable="true">2</td>
                            <td contenteditable="true">MUHAMMED SWALIH K</td>
                            <td contenteditable="true">KRP WEST</td>
                            <td contenteditable="true">B</td>
                            <td contenteditable="true">B</td>
                            <td contenteditable="true">6</td>
                            <td contenteditable="true">3RD</td>
                            <td contenteditable="true"></td>
                        </tr>
                         <tr>
                            <td contenteditable="true">3</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                        </tr>
                         <tr>
                            <td contenteditable="true">4</td>
                            <td contenteditable="true"></td>

                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                        </tr>
                         <tr>
                            <td contenteditable="true">5</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>

                        </tr>
                         <tr>
                            <td contenteditable="true">6</td>

                        </tr>
                         <tr>
                            <td contenteditable="true">7</td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>
                            <td contenteditable="true"></td>

                            <td contenteditable="true"></td>
                        </tr>
                         <tr>
                            <td contenteditable="true">8</td>

                        </tr>

                            <td contenteditable="true"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Add Row Functionality
        document.getElementById('addRowBtn').addEventListener('click', function() {
            const tbody = document.querySelector('#dataTable tbody');
            const rowCount = tbody.querySelectorAll('tr').length + 1;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true">${rowCount}</td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
            `;
            tbody.appendChild(tr);
        });

        // Download Image Functionality
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const certificate = document.getElementById('certificateNode');
            
            // Temporary scale up for high quality image export
            html2canvas(certificate, {
                scale: 3, // High resolution
                useCORS: true // Allows loading external images if hosted elsewhere
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Sahityotsav_List.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
