<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahityotsav Bulk Sheet Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sheet" id="sheet">

        <!-- Header -->
        <div class="top-header">

            <img src="images/logo.png" class="left-logo" alt="Logo">

            <div class="header-center">
                <img src="images/fest.png" class="fest-logo" alt="Sahityotsav">
            </div>

            <img src="images/33.png" class="edition-logo" alt="33 Edition">

        </div>

        <!-- Editable Event Name -->
        <div class="event-wrapper">
            <h2 class="event-name" contenteditable="true" spellcheck="false">LP PENCIL DRAWING</h2>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table class="result-table">
                <thead>
                    <tr>
                        <th class="col-no">NO</th>
                        <th class="col-participant">PARTICIPANTS</th>
                        <th class="col-block">BLOCK</th>
                        <th class="col-code">CODE</th>
                        <th class="col-grade">GRADE</th>
                        <th class="col-point">POINT</th>
                        <th class="col-rank">RANK</th>
                        <th class="col-sign">SIGNATURE</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <!-- Rows will be generated by script.js -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Control Buttons -->
    <div class="buttons">
    <button onclick="addRow()">+ Add Row</button>
    <button onclick="deleteRow()">Delete Row</button>
    <button onclick="printSheet()">Print</button>
    <button onclick="downloadPNG()">PNG</button>
    <button onclick="downloadPDF()">PDF</button>
    <button onclick="clearSheet()">Clear</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>
</html>
