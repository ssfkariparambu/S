<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahityotsav Certificate Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sheet">

    <!-- Header -->
    <div class="top-header">

        <img src="images/logo.png" class="left-logo">

        <img src="images/fest.png" class="fest-logo">

        <img src="images/33.png" class="edition-logo">

    </div>

    <h2 contenteditable="true" class="event-name">
        LP PENCIL DRAWING
    </h2>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>NO</th>
                <th>PARTICIPANTS</th>
                <th>BLOCK</th>
                <th>CODE</th>
                <th>GRADE</th>
                <th>POINT</th>
                <th>RANK</th>
                <th>SIGNATURE</th>
            </tr>
        </thead>

        <tbody id="tableBody">
            <!-- Rows generated by JavaScript -->
        </tbody>

    </table>

</div>

<div class="buttons">
    <button onclick="addRow()">+ Add Row</button>
</div>

<script src="script.js"></script>

</body>
</html>
