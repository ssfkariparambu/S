<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sahityotsav Bulk Sheet Generator</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sheet">

    <!-- Header -->

    <div class="top-header">

        <img src="images/logo.png" class="left-logo" alt="Logo">

        <img src="images/fest.png" class="fest-logo" alt="Fest Logo">

        <img src="images/33.png" class="edition-logo" alt="33 Edition">

    </div>

    <!-- Editable Event Name -->

    <h2 class="event-name" contenteditable="true">
        LP PENCIL DRAWING
    </h2>

    <!-- Table -->

    <table>

        <thead>

            <tr>

                <th>NO</th>

                <th>PARTICIPANTS</th>

                <th>BLOCK</th>

                <th>CODE</th>

                <th>GRADE</th>

                <th>POINT</th>

                <th>RANK</th>

                <th>SIGNATURE</th>

            </tr>

        </thead>

        <tbody id="tableBody">

            <!-- Rows will be added by JavaScript -->

        </tbody>

    </table>

</div>

<!-- Buttons -->

<div class="buttons">
    <button onclick="addRow()">+ Add Row</button>
    <button onclick="deleteRow()">Delete Row</button>
    <button onclick="printSheet()">Print</button>
</div>
<script src="script.js"></script>

</body>
</html>
